version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: remitano_development
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: bundle exec puma -C config/puma.rb
    volumes:
      - .:/app
    ports:
      - '3969:3969'
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/remitano_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      FRONTEND_URL: http://localhost:3001
      JWT_SECRET: ${JWT_SECRET:-devsecret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  sidekiq:
    build: .
    command: bundle exec sidekiq
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/remitano_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      JWT_SECRET: ${JWT_SECRET:-devsecret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3969
      # Browser can't resolve Docker hostnames — WS must use localhost (host port).
      NEXT_PUBLIC_WS_URL: ws://localhost:3969
      PORT: 3001
    depends_on:
      - backend

volumes:
  postgres_data:
